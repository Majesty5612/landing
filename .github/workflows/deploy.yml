name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Inject secrets
        run: |
          sed -i "s|__API_TOKEN__|${{ secrets.API_TOKEN }}|g" index.html
          sed -i "s|__API_TOKEN__|${{ secrets.API_TOKEN }}|g" en/index.html
          sed -i "s|__API_BASE__|${{ secrets.API_BASE }}|g" index.html
          sed -i "s|__API_BASE__|${{ secrets.API_BASE }}|g" en/index.html

      - name: Verify secrets injected
        run: |
          echo "Checking index.html for remaining placeholders..."
          if grep -q '__API_BASE__' index.html; then echo "ERROR: __API_BASE__ not replaced in index.html"; exit 1; fi
          if grep -q '__API_TOKEN__' index.html; then echo "ERROR: __API_TOKEN__ not replaced in index.html"; exit 1; fi
          if grep -q '__API_BASE__' en/index.html; then echo "ERROR: __API_BASE__ not replaced in en/index.html"; exit 1; fi
          if grep -q '__API_TOKEN__' en/index.html; then echo "ERROR: __API_TOKEN__ not replaced in en/index.html"; exit 1; fi
          echo "All placeholders replaced successfully."

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
